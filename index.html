<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ARTG 2262 Homework</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #ffffff;
      color: #000;
    }

    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 28px 40px 60px;
    }

    h1 {
      font-size: 1.6em;
      font-weight: bold;
      margin-bottom: 24px;
      line-height: 1.3;
    }

    h1 em {
      font-style: italic;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px 24px;
    }

    .grid a {
      display: block;
      text-decoration: none;
      color: #000;
    }

    .grid a:hover .thumb {
      opacity: 0.82;
    }

    .thumb {
      width: 100%;
      aspect-ratio: 4/3;
      display: block;
      border: 1px solid #000;
      object-fit: cover;
      background: #eee;
    }

    .label {
      margin-top: 5px;
      font-size: 0.78em;
      line-height: 1.3;
    }
  </style>
</head>
<body>
<div class="page">

  <h1>Nick Forrest's <em>ARTG 2262: Prototyping with Code</em> homework!</h1>

  <div class="grid">

    <!-- Assignment 1 -->
    <a href="https://scratch.mit.edu/projects/1264596664/editor/" target="_blank" rel="noopener">
      <img class="thumb" src="thumb1.jpg" alt="Assignment 1 – Scratch Project"/>
      <div class="label">Assignment[1] = Scratch Project</div>
    </a>

    <!-- Assignment 2 -->
    <a href="hw2/index.html">
      <img class="thumb" src="thumb2.png" alt="Assignment 2 – Calculator"/>

    </a>

    <!-- Assignment 3 -->
    <a href="hw3/index.html">
      <img class="thumb" src="thumb3.jpg" alt="Assignment 3 – Self Portrait"/>

    </a>

    <!-- Assignment 4 -->
    <a href="hw4/index.html">
      <img class="thumb" src="thumb4.jpg" alt="Assignment 4 – Ice Pucks Pattern"/>
      <div class="label">Assignment[4] = Ice Pucks Pattern</div>
    </a>

    <!-- Assignment 5 -->

  </div>
</div>
